<!doctype html>
<html lang="es">
  <head>
    <!-- Metadatos base y hojas de estilo del módulo -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hirata - Administración de Flota</title>
    <link rel="icon" href="../../assets/img/truck.png" type="image/png">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/main.css" />
  </head>
  <body class="d-flex flex-column min-vh-100 bg-light">
    <!-- Barra superior con identidad y sesión -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container-fluid">
        <img src="../../assets/img/letras-blancas.png" alt="Logo" class="navbar-brand img-fluid" style="max-height: 40px;">
        <div class="d-flex">
          <span class="navbar-text me-3 text-white" id="nombreUsuario"></span>
          <span
            class="badge text-bg-light me-3 align-self-center"
            id="personajeBadge"
          ></span>
        
          <div id="logoutNavSlot" class="me-3 align-self-center"></div>
        </div>
      </div>
    </nav>

    <main class="container-fluid flex-grow-1 p-3 p-md-4">
      <!-- Layout principal: cabecera, sidebar y área de contenido -->
      <section class="container-fluid px-0">
        <div id="sidebarBackdrop" class="sidebar-backdrop d-lg-none" aria-hidden="true"></div>
        <div class="row g-3">
          <div class="col-12">
            <!-- Título del módulo -->
            <div class="card">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                  <h3 class="h5 mb-1">Administración de Flota</h3>
                  <button
                    type="button"
                    id="toggleSidebarBtnMobile"
                    class="btn btn-outline-primary btn-sm d-lg-none"
                  >
                    <i class="bi bi-list"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-3 d-none d-lg-block" id="sidebarCol"></div>

          <div class="col-12 col-lg-9" id="contentCol">
            <!-- Sección: alta de camión -->
            <div class="card mb-3 adm-section" id="registerTruckSection">
              <div class="card-body">
                <h4 class="h6 mb-3">Registrar Camión</h4>
                <hr class="my-4" />
                <form id="truckForm" class="row g-3">
                  <div class="col-12">
                    <label for="truckPlate" class="form-label">Patente</label>
                    <input
                      type="text"
                      id="truckPlate"
                      class="form-control"
                      placeholder="Ej: A0A0A0"
                      required
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="truckBrand" class="form-label">Marca</label>
                    <input
                      type="text"
                      id="truckBrand"
                      class="form-control"
                      placeholder="Ej: Volvo"
                      required
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="truckModel" class="form-label">Modelo</label>
                    <input
                      type="text"
                      id="truckModel"
                      class="form-control"
                      placeholder="Ej: FH"
                      required
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="truckYear" class="form-label">Año</label>
                    <input
                      type="number"
                      id="truckYear"
                      class="form-control"
                      min="1950"
                      max="2100"
                      required
                    />
                  </div>
                  <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                      Guardar camión
                    </button>
                    <button type="reset" class="btn btn-outline-secondary">
                      Limpiar
                    </button>
                  </div>
                </form>
                <div id="truckAlert" class="mt-3"></div>
              </div>
            </div>

            <!-- Sección: tabla de camiones -->
            <div class="card adm-section d-none" id="trucksTableSection">
              <div class="card-body">
                <div id="sectionTrucksTable">
                  <h4 class="h6 mb-3">Camiones registrados</h4>
                  <hr class="my-4" />
                  <div class="table-responsive">
                    <table class="table table-sm align-middle text-nowrap" id="trucksTable">
                      <thead>
                        <tr>
                          <th>Patente</th>
                          <th>Marca</th>
                          <th>Modelo</th>
                          <th>Año</th>
                          <th>Conductor</th>
                          <th>Acción</th>
                        </tr>
                      </thead>
                      <tbody id="trucksTableBody"></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>

            <!-- Sección: alta de conductor -->
            <div class="card adm-section d-none" id="newDriverSection">
              <div class="card-body">
                <h4 class="h6 mb-6">Agregar nuevo Usuario</h4>
                <hr class="my-4" />

                <form id="newDriverForm" class="row g-3">
                  <div class="col-12">
                    <label for="driverFullName" class="form-label"
                      >Nombre completo</label
                    >
                    <input
                      type="text"
                      id="driverFullName"
                      class="form-control"
                      placeholder="Ej: Carlos Rojas"
                      required
                    />
                  </div>
                  <div class="col-12">
                    <label for="rol" class="form-label">Rol</label>
                    <select id="rol" class="form-select" required>
                      <option value="">Selecciona un rol</option>
                      <option value="superadmin">Administrador de Flota</option>
                      <option value="admin">Administrador de TI</option>
                      <option value="maintenance">Administrador de Mantenimiento</option>
                      <option value="it_tech">Tecnico de TI</option>
                      <option value="driver">Conductor</option>
                    </select>
                  </div>
                  <div class="col-12">
                    <label for="driverEmail" class="form-label">Correo</label>
                    <input
                      type="email"
                      id="driverEmail"
                      class="form-control"
                      placeholder="Ej: c.rojas@hirata.com"
                      required
                    />
                  </div>
                  <div class="col-12">
                    <label for="driverPassword" class="form-label"
                      >Contraseña</label
                    >
                    <input
                      type="password"
                      id="driverPassword"
                      class="form-control"
                      minlength="6"
                      required
                    />
                  </div>
                  <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                      Guardar Usuario
                    </button>
                    <button type="reset" class="btn btn-outline-secondary">
                      Limpiar
                    </button>
                  </div>
                </form>
                <div id="driverAlert" class="mt-3"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="modal fade" id="assignDriverModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <form id="assignDriverForm">
            <div class="modal-header">
              <h5 class="modal-title">Asignar conductor</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="assignTruckId" />
              <div class="mb-3">
                <label for="assignDriverSelect" class="form-label">Conductor disponible</label>
                <select id="assignDriverSelect" class="form-select" required>
                  <option value="" disabled selected>Selecciona conductor</option>
                </select>
              </div>
              <div id="assignDriverAlert"></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary" id="assignDriverSubmitBtn">Asignar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Pie de página institucional -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
      <div class="container">
        <p class="mb-0">
          © 2026 Transportes Hirata. Todos los derechos reservados.
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Lógica específica del módulo + control global de sesión/navbar -->
    <script type="module" src="../../app/admflota.js"></script>
    <script type="module" src="../../app/app.js"></script>
  </body>
</html>

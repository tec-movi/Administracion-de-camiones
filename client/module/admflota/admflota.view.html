<!doctype html>
<html lang="es">
  <head>
    <!-- Metadatos base y hojas de estilo del módulo -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hirata - Administración de Flota</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../../styles/main.css" />
  </head>
  <body class="d-flex flex-column min-vh-100 bg-light">
    <!-- Barra superior con identidad y sesión -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container-fluid">
        <span class="navbar-brand">Hirata</span>
        <div class="d-flex">
          <span class="navbar-text me-3 text-white" id="nombreUsuario"></span>
          <span
            class="badge text-bg-light me-3 align-self-center"
            id="personajeBadge"
          ></span>
          <div id="notificationNavSlot" class="me-3 align-self-center"></div>
          <div id="logoutNavSlot" class="me-3 align-self-center"></div>
        </div>
      </div>
    </nav>

    <main class="container-fluid flex-grow-1 p-3 p-md-4">
      <!-- Layout principal: cabecera, sidebar y área de contenido -->
      <section class="container-fluid px-0">
        <div class="row g-3">
          <div class="col-12">
            <!-- Título del módulo -->
            <div class="card">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                  <h3 class="h5 mb-1">Administración de Flota</h3>
                  <button
                    type="button"
                    id="toggleSidebarBtnMobile"
                    class="btn btn-outline-primary btn-sm d-lg-none"
                  >
                    <i class="bi bi-list"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-3 d-none d-lg-block" id="sidebarCol">
            <!-- Menú lateral de navegación por secciones -->
            <aside class="adm-sidebar card h-100" id="admSidebar">
              <div class="card-body">
                <div
                  class="d-flex justify-content-between align-items-center mb-3 adm-sidebar-header"
                >
                  <h4
                    class="h6 text-uppercase text-muted mb-0 adm-sidebar-title"
                  >
                    Menú
                  </h4>
                  <button
                    type="button"
                    id="toggleSidebarBtn"
                    class="btn btn-outline-primary btn-sm d-none d-lg-inline-flex"
                  >
                    <i class="bi bi-list"></i>
                  </button>
                </div>
                <nav class="d-flex flex-column gap-2">
                  <a
                    class="adm-sidebar-link active"
                    href="#"
                    data-section-target="registerTruckSection"
                  >
                    <i class="bi bi-truck me-2"></i>
                    <span class="adm-sidebar-label">Registrar camión</span>
                  </a>
                  <a
                    class="adm-sidebar-link"
                    href="#"
                    data-section-target="newDriverSection"
                  >
                    <i class="bi bi-person-plus me-2"></i>
                    <span class="adm-sidebar-label">Agregar conductor</span>
                  </a>
                </nav>
              </div>
            </aside>
          </div>

          <div class="col-12 col-lg-9" id="contentCol">
            <!-- Sección: alta de camión + tabla de camiones -->
            <div class="card mb-3 adm-section" id="registerTruckSection">
              <div class="card-body">
                <h4 class="h6 mb-3">Registrar Camión</h4>
                <form id="truckForm" class="row g-3">
                  <div class="col-12">
                    <label for="truckPlate" class="form-label">Patente</label>
                    <input
                      type="text"
                      id="truckPlate"
                      class="form-control"
                      placeholder="Ej: A0A0A0"
                      required
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="truckBrand" class="form-label">Marca</label>
                    <input
                      type="text"
                      id="truckBrand"
                      class="form-control"
                      placeholder="Ej: Volvo"
                      required
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="truckModel" class="form-label">Modelo</label>
                    <input
                      type="text"
                      id="truckModel"
                      class="form-control"
                      placeholder="Ej: FH"
                      required
                    />
                  </div>
                  <div class="col-12 col-md-6">
                    <label for="truckYear" class="form-label">Año</label>
                    <input
                      type="number"
                      id="truckYear"
                      class="form-control"
                      min="1950"
                      max="2100"
                      required
                    />
                  </div>
                  <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                      Guardar camión
                    </button>
                    <button type="reset" class="btn btn-outline-secondary">
                      Limpiar
                    </button>
                  </div>
                </form>
                <div id="truckAlert" class="mt-3"></div>

                <hr class="my-4" />
                <!-- Tabla editable de camiones registrados -->
                <div id="sectionTrucksTable">
                  <h4 class="h6 mb-3">Camiones registrados</h4>
                  <div class="table-responsive">
                    <table class="table table-sm align-middle" id="trucksTable">
                      <thead>
                        <tr>
                          <th>Patente</th>
                          <th>Marca</th>
                          <th>Modelo</th>
                          <th>Año</th>
                          <th>Conductor</th>
                        </tr>
                      </thead>
                      <tbody id="trucksTableBody"></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>

            <!-- Sección: alta de conductor -->
            <div class="card adm-section d-none" id="newDriverSection">
              <div class="card-body">
                <h4 class="h6 mb-3">Agregar nuevo conductor</h4>
                <form id="newDriverForm" class="row g-3">
                  <div class="col-12">
                    <label for="driverFullName" class="form-label"
                      >Nombre completo</label
                    >
                    <input
                      type="text"
                      id="driverFullName"
                      class="form-control"
                      placeholder="Ej: Carlos Rojas"
                      required
                    />
                  </div>
                  <div class="col-12">
                    <label for="driverEmail" class="form-label">Correo</label>
                    <input
                      type="email"
                      id="driverEmail"
                      class="form-control"
                      placeholder="Ej: c.rojas@hirata.com"
                      required
                    />
                  </div>
                  <div class="col-12">
                    <label for="driverPassword" class="form-label"
                      >Contraseña</label
                    >
                    <input
                      type="password"
                      id="driverPassword"
                      class="form-control"
                      minlength="6"
                      required
                    />
                  </div>
                  <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                      Guardar conductor
                    </button>
                    <button type="reset" class="btn btn-outline-secondary">
                      Limpiar
                    </button>
                  </div>
                </form>
                <div id="driverAlert" class="mt-3"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Pie de página institucional -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
      <div class="container">
        <p class="mb-0">
          © 2026 Transportes Hirata. Todos los derechos reservados.
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Lógica específica del módulo + control global de sesión/navbar -->
    <script type="module" src="../../app/admflota.js"></script>
    <script type="module" src="../../app/app.js"></script>
  </body>
</html>

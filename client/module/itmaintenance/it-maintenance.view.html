<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hirata - Soporte TI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
  <!-- Barra superior con identidad y sesión -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <span class="navbar-brand">Hirata - TI</span>
      <div class="d-flex">
        <span class="navbar-text me-3 text-white" id="nombreUsuario"></span>
        <span class="badge text-bg-light me-3 align-self-center" id="personajeBadge"></span>
        <div id="notificationNavSlot" class="me-3 align-self-center"></div>
        <div id="logoutNavSlot" class="me-3 align-self-center"></div>
      </div>
    </div>
  </nav>
  
  <main class="container-fluid flex-grow-1 p-3 p-md-4">
    <section class="container-fluid px-0">
      <div id="sidebarBackdrop" class="sidebar-backdrop d-lg-none" aria-hidden="true"></div>
      <div class="row g-3">
        <div class="col-12">
          <!-- Título del módulo -->
          <div class="card">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <h3 class="h5 mb-1">Soporte TI</h3>
                <button
                  type="button"
                  id="toggleSidebarBtnMobile"
                  class="btn btn-outline-primary btn-sm d-lg-none"
                >
                  <i class="bi bi-list"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-3 d-none d-lg-block" id="sidebarCol"></div>

        <div class="col-12 col-lg-9" id="contentCol">
          <!-- Sección: Registrar Mantenimiento IT -->
          <div class="card adm-section" id="registerItMaintenanceSection">
            <div class="card-body">
              <h4 class="h6 mb-3"><i class="bi bi-tools"></i> Registrar Mantenimiento de Equipo (IT)</h4>
              <hr class="my-4" />
              <div id="responseAlert"></div>
              <form id="formItMaintenance" class="row g-3">
                <div class="col-md-6">
                  <label for="equipment_id" class="form-label">Equipo</label>
                  <select id="equipment_id" name="equipment_id" class="form-select" required>
                    <option value="" selected disabled>Cargando equipos...</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label for="type" class="form-label">Tipo de Mantenimiento</label>
                  <select name="type" id="type" class="form-select" required>
                    <option value="preventivo">Preventivo</option>
                    <option value="correctivo">Correctivo</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label" for="description">Descripción / Tareas realizadas</label>
                  <textarea name="description" id="description" class="form-control" rows="3" required></textarea>
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="cost">Costo en CLP (Opcional)</label>
                  <input type="number" name="cost" id="cost" class="form-control" placeholder="0" min="0">
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="final_status">Estado Final</label>
                  <select name="final_status" id="final_status" class="form-select" required>
                    <option value="operativo">Operativo</option>
                    <option value="en reparacion">En reparación</option>
                    <option value="de baja">Dado de baja</option>
                  </select>
                </div>
                <div class="col-12 mt-4">
                  <button type="submit" class="btn btn-primary w-100">Guardar Registro</button>
                </div>
              </form>
            </div>
          </div>

          <!-- Sección: Agregar Equipo -->
          <div class="card adm-section d-none" id="addEquipmentSection">
            <div class="card-body">
              <h4 class="h6 mb-3"><i class="bi bi-plus-square"></i> Agregar nuevo equipo</h4>
              <hr class="my-4" />
              <div id="responseAlertAddEquipment"></div>
              <form id="formAddEquipment" class="row g-3">
                <div class="col-md-6">
                  <label for="inventory_code" class="form-label">Código de Inventario</label>
                  <input type="text" name="inventory_code" id="inventory_code" class="form-control" required>
                </div>
                <div class="col-md-6">
                  <label for="eq_type" class="form-label">Tipo de Equipo</label>
                  <select name="type" id="eq_type" class="form-select" required>
                    <option value="PC">PC</option>
                    <option value="Laptop">Laptop</option>
                    <option value="Impresora">Impresora</option>
                    <option value="Servidor">Servidor</option>
                    <option value="Switch">Switch</option>
                    <option value="Access Point">Access Point</option>
                    <option value="Router">Router</option>
                    <option value="Otro">Otro</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label for="equipmentBrand" class="form-label">Marca</label>
                  <input type="text" name="brand" id="equipmentBrand" class="form-control" required>
                </div>
                <div class="col-md-6">
                  <label for="equipmentModel" class="form-label">Modelo</label>
                  <input type="text" name="model" id="equipmentModel" class="form-control" required>
                </div>
                <div class="col-md-6">
                  <label for="equipmentSerialNumber" class="form-label">Número de Serie</label>
                  <input type="text" name="serial_number" id="equipmentSerialNumber" class="form-control" required>
                </div>
                <div class="col-md-6">
                  <label for="equipmentLocation" class="form-label">Ubicación</label>
                  <input type="text" name="location" id="equipmentLocation" class="form-control" placeholder="Ej: Sala de Informática, Oficina 101">
                </div>
                <div class="col-12">
                  <label for="equipmentStatus" class="form-label">Estado</label>
                  <select name="status" id="equipmentStatus" class="form-select">
                    <option value="operativo">Operativo</option>
                    <option value="en reparacion">En reparación</option>
                    <option value="de baja">De baja</option>
                  </select>
                </div>
                <div class="col-12 mt-3">
                  <button type="submit" class="btn btn-primary w-100">Guardar Equipo</button>
                </div>
              </form>
            </div>
          </div>
          <!-- Sección: Historial de Software instalado en Equipos -->
          <div class="card adm-section d-none" id="historySoftwareSection">
            <div class="card-body">
              <h4 class="h6 mb-3"><i class="bi bi-clock-history"></i> Historial de Software</h4>
              <hr class="my-4" />
                <div class="table-responsive px-0">
                  <table class="table table-hover align-middle text-nowrap">
                    <thead class="table-light">
                       <tr>
                        <th>ID</th>
                        <th>Equipo (Código)</th>
                        <th>Software</th>
                        <th>Versión</th>
                        <th>Tipo de Licencia</th>
                        <th>Fecha de Instalación/Actualización</th>
                        <th>Ver Detalles</th>
                      </tr>
                    </thead>
                    <tbody id="historySoftwareTableBody">
                    <!-- Registros cargados desde JS -->
                    </tbody>
                  </table>
                </div>
            </div>
          </div>

          <!-- Modal de cambio de estado eliminado: la BD no tiene campo 'status' -->
        </div>
    </section>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <div class="container">
      <p class="mb-0">© 2026 Transportes Hirata. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Control global de sesión/navbar -->
  <script type="module" src="../../app/app.js"></script>
  <!-- Importamos la lógica de mantenimiento IT -->
  <script type="module">
      import { init } from '../../app/it-maintenance.js';
      document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>

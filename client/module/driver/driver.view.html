<!doctype html>
<html lang="es">
  <head>
    <!-- Metadatos base y hojas de estilo del módulo -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hirata - Modulo Conductor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../../styles/main.css" />
  </head>
  <body class="d-flex flex-column min-vh-100 bg-light">
    <!-- Barra superior con usuario autenticado -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container-fluid">
        <span class="navbar-brand">Hirata</span>
        <div class="d-flex">
          <span class="navbar-text me-3 text-white" id="nombreUsuario"></span>
          <span
            class="badge text-bg-light me-3 align-self-center"
            id="personajeBadge"
          ></span>
          <div id="logoutNavSlot" class="me-3 align-self-center"></div>
        </div>
      </div>
    </nav>
    <main class="container-fluid flex-grow-1 p-3 p-md-4">
      <!-- Contenido principal: formulario de registro de kilometraje -->
      <section class="container-fluid px-0">
        <div class="row g-3">
          <div class="col-12">
            <!-- Título del módulo conductor -->
            <div class="card">
              <div class="card-body">
                <h3 class="h5 mb-1">Registro de kilometraje</h3>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-8">
            <!-- Formulario de entrada de datos del recorrido -->
            <div class="card h-100">
              <div class="card-body">
                <h4 class="h6 mb-3">Ingreso de datos</h4>
                <form id="kilometrajeForm">
                  <div class="row g-3">
                    <div class="col-12 col-md-6">
                      <label for="assignedTruck" class="form-label"
                        >Vehículo asignado:</label
                      ><br />
                      <input readonly class="form-control" id="assignedTruck"></input>
                    </div>

                    <div class="col-12 col-md-6">
                      <label for="driverMileageValue" class="form-label"
                        >Kilometraje final</label
                      >
                      <div class="input-group">
                        <input
                          type="number"
                          id="driverMileageValue"
                          class="form-control"
                          placeholder="Ej: 50320"
                          min="0"
                        />
                        <span class="input-group-text">km</span>
                      </div>
                    </div>

                    <div class="col-12 col-md-6">
                      <label for="driverRouteDate" class="form-label"
                        >Fecha y hora de recorrido</label
                      >
                      <input
                        type="datetime-local"
                        id="driverRouteDate"
                        class="form-control"
                      />
                    </div>

                    <div class="col-12 d-flex gap-2 pt-1">
                      <button
                        type="button"
                        id="saveMileageBtn"
                        class="btn btn-primary"
                      >
                        Guardar kilometraje
                      </button>
                      <button
                        type="button"
                        id="clearMileageBtn"
                        class="btn btn-outline-secondary"
                      >
                        Limpiar
                      </button>
                    </div>
                  </div>
                </form>
                <div id="mileageAlert" class="mt-3"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <!-- Pie de página institucional -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
      <div class="container">
        <p class="mb-0">
          © 2026 Transportes Hirata. Todos los derechos reservados.
        </p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Lógica específica de kilometraje + control global de sesión/navbar -->
    <script type="module" src="../../app/driver-mileage.js"></script>
    <script type="module" src="../../app/app.js"></script>
  </body>
</html>

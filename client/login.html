<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Metadatos y dependencias de la pantalla de login -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: url('styles/img/fondologin.jpg') center/cover no-repeat;
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.25);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1055;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .loading-overlay.is-visible {
            opacity: 1;
            visibility: visible;
        }
        .loading-card {
            min-width: 220px;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }
        .login-glass {
            background: rgba(255, 255, 255, 0.58);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .login-wrapper {
            width: min(100%, 420px);
            padding: 0 1rem;
        }
        .login-card {
            border-radius: 14px;
            padding: 1.5rem;
        }
        .login-card .form-control,
        .login-card .btn {
            min-height: 46px;
        }
        #togglePassword {
            min-height: 46px;
            background-color: #002B5B;
            border-color: #002B5B;
        }
        #togglePassword:hover {
            background-color: #2B4865;
            border-color: #2B4865;
        }
        #togglePasswordIcon {
            color: #ffffff;
        }
        @media (max-width: 576px) {
            .login-wrapper {
                padding: 0 0.875rem;
            }
            .login-card {
                padding: 1.25rem;
            }
            .login-card h3 {
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
<!-- Contenedor principal del formulario de acceso -->
<div class="container login-wrapper">
    <div class="card login-card login-glass">
        <h3 class="text-center mb-4">Hirata</h3>
        <form id="loginForm">
            <input type="text" id="usuario" class="form-control mb-3" placeholder="Email" required>
            <div class="input-group mb-3">
                <input type="password" id="password" class="form-control" placeholder="Contraseña" required>
                <button class="btn btn-outline-secondary" type="button" id="togglePassword" aria-label="Mostrar contraseña">
                    <i class="bi bi-eye" id="togglePasswordIcon"></i>
                </button>
            </div>

            <button class="btn btn-primary w-100">Ingresar</button>
        </form>
        <div id="alertaLogin" class="mt-3"></div>
    </div>
</div>
<!-- Overlay de carga mientras se procesa autenticación -->
<div id="loadingOverlay" class="loading-overlay" aria-live="polite" aria-hidden="true">
    <div class="loading-card p-4 text-center">
        <div class="spinner-border text-primary mb-3" role="status" aria-hidden="true"></div>
        <p class="mb-0 fw-semibold">Cargando...</p>
    </div>
</div>
<!-- Lógica de autenticación y redirección por rol -->
<script type="module" src="app/login.js"></script>
</body>
</html>

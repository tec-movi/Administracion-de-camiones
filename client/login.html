<!DOCTYPE html>
<html lang="es" data-theme="light"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Proyecto Hirata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/pages/login.css">
    <link rel="icon" href="assets/img/truck.png" type="image/png">
</head>
<body class="login-page d-flex align-items-center vh-100">
<div class="container login-wrapper">
    <div class="card login-card login-glass position-relative">
        
        <div class="position-absolute top-0 end-0 m-3">
            <button id="themeBtn" class="toggle-btn" type="button" aria-label="Cambiar tema" title="Cambiar tema">
                <span class="sun"><i class="bi bi-brightness-high"></i></span>
                <span class="moon"><i class="bi bi-moon"></i></span>
            </button>
        </div>

        <h1 class="text-center mb-4 login-logo">
            <img src="assets/img/letra-azul.png" alt="Logo" class="img-fluid logo-light" style="max-height: 100px;">
            <img src="assets/img/letras-blancas.png" alt="Logo" class="img-fluid logo-dark" style="max-height: 100px;">
        </h1>
        
        <form id="loginForm">
            <input type="text" id="usuario" class="form-control mb-3" placeholder="Email" required>
            <div class="input-group mb-3">
                <input type="password" id="password" class="form-control" placeholder="Contraseña" required>
                <button class="btn btn-outline-secondary" type="button" id="togglePassword" aria-label="Mostrar contraseña">
                    <i class="bi bi-eye" id="togglePasswordIcon"></i>
                </button>
            </div>

            <button class="btn btn-primary w-100">Ingresar</button>
        </form>
        <div id="alertaLogin" class="mt-3"></div>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay" aria-live="polite" aria-hidden="true">
    <div class="loading-card p-4 text-center">
        <div class="spinner-border text-primary mb-3" role="status" aria-hidden="true"></div>
        <p class="mb-0 fw-semibold">Cargando...</p>
    </div>
</div>

<script src="app/themes.js"></script>
<script type="module" src="app/login.js"></script>
</body>
</html>
